services:
  hub:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.25.0 --activate && pnpm install --frozen-lockfile && pnpm exec next dev --turbopack --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    volumes:
      - ../:/app
      - hub-node-modules:/app/node_modules
    ports:
      - "${HUB_DEV_PORT:-3000}:3000"

volumes:
  hub-node-modules:
