name: Build and push Docker image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest

    env:
      IMAGE_NAME: fleetctrl-hub
      MIGRATION_IMAGE_NAME: fleetctrl-convex-migration
      # GHCR
      GHCR_REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' ./package.json)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "FULL_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Compute image coordinates (GHCR)
        id: coords
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LC=$OWNER_LC" >> "$GITHUB_ENV"

          echo "GHCR_IMAGE=${{ env.GHCR_REGISTRY }}/$OWNER_LC/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "GHCR_MIGRATION_IMAGE=${{ env.GHCR_REGISTRY }}/$OWNER_LC/${{ env.MIGRATION_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Build and push app (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.FULL_VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
          # volitelné lepší tagy/labels:
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.FULL_VERSION }}

      - name: Build and push convex-migration image (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.convex-migration
          push: true
          tags: |
            ${{ env.GHCR_MIGRATION_IMAGE }}:${{ env.FULL_VERSION }}
            ${{ env.GHCR_MIGRATION_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.FULL_VERSION }}
